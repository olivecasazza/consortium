name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:
  # Note: release docs are deployed by the release workflow directly
  # (GITHUB_TOKEN events don't trigger other workflows)

permissions:
  contents: write

jobs:
  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          cargo doc --workspace --no-deps
          echo '<meta http-equiv="refresh" content="0; url=consortium/index.html">' \
            > target/doc/index.html

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy versioned docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: ${{ steps.version.outputs.version }}
          keep_files: true

      - name: Also update /latest/ on release
        if: steps.version.outputs.is_release == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: latest
          keep_files: true

      - name: Deploy version index
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-index
          destination_dir: .
          keep_files: true

      - name: Generate summary
        run: |
          echo "## Documentation Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://olivecasazza.github.io/consortium/${{ steps.version.outputs.version }}/consortium/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Crates | $(ls -d target/doc/consortium* 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
