name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  packages: write

jobs:
  # ── Validate commit messages ──────────────────────────────────────
  lint-commits:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ── Run all tests ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-commits
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --profile ci --no-fail-fast 2>&1 || true

      - name: Build release
        run: cargo build --release -p consortium -p consortium-cli -p consortium-nix

  # ── Semantic Release ──────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/github

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Publish to crates.io
        if: env.CRATES_IO_TOKEN != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          # Publish in dependency order — core first, then dependents
          echo "Publishing consortium (core)..."
          cargo publish -p consortium --no-verify || true

          echo "Publishing consortium-nix..."
          cargo publish -p consortium-nix --no-verify || true

          echo "Publishing consortium-ansible..."
          cargo publish -p consortium-ansible --no-verify || true

          echo "Publishing consortium-slurm..."
          cargo publish -p consortium-slurm --no-verify || true

          echo "Publishing consortium-ray..."
          cargo publish -p consortium-ray --no-verify || true

          echo "Publishing consortium-skypilot..."
          cargo publish -p consortium-skypilot --no-verify || true

          echo "Publishing consortium-cli..."
          cargo publish -p consortium-cli --no-verify || true

      - name: Generate release summary
        if: always()
        run: |
          echo "## Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${LATEST_TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs | [olivecasazza.github.io/consortium/${LATEST_TAG}/](https://olivecasazza.github.io/consortium/${LATEST_TAG}/consortium/) |" >> $GITHUB_STEP_SUMMARY
