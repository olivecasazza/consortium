name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'doc/**'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Layer 1: Unit Tests (fast, GitHub-hosted) ─────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: |
          cargo nextest run --workspace \
            --profile ci \
            --no-fail-fast \
            2>&1 || true

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Unit Test Results
          include_passed: true

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Layer 2: Docker Integration Tests (GitHub-hosted) ─────────────
  docker-integration:
    name: Docker Integration Tests
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docker-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate SSH keys for test containers
        run: |
          mkdir -p tests/docker/ssh
          ssh-keygen -t ed25519 -f tests/docker/ssh/id_ed25519 -N "" -q
          cp tests/docker/ssh/id_ed25519.pub tests/docker/ssh/authorized_keys

      - name: Build SSH node image
        run: docker build -t consortium-ssh-node -f tests/docker/Dockerfile.ssh-node tests/docker/

      - name: Run Docker integration tests
        run: |
          cargo nextest run -p consortium \
            --features docker-tests \
            --test docker_integration \
            --profile ci \
            --test-threads=1 \
            --no-fail-fast \
            2>&1 || true

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Docker Integration Results
          include_passed: true

      - name: Cleanup containers
        if: always()
        run: |
          docker ps -a --filter "name=consortium-test" -q | xargs -r docker rm -f
          docker network ls --filter "name=consortium-test" -q | xargs -r docker network rm

  # ── Layer 2b: Tool Integration Tests (self-hosted, needs Docker + nix) ─
  tool-integration:
    name: Tool Integration Tests
    needs: unit
    runs-on: nix-builder
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tool-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate SSH keys for test containers
        run: |
          mkdir -p tests/docker/ssh
          if [ ! -f tests/docker/ssh/id_ed25519 ]; then
            ssh-keygen -t ed25519 -f tests/docker/ssh/id_ed25519 -N "" -q
            cp tests/docker/ssh/id_ed25519.pub tests/docker/ssh/authorized_keys
          fi

      - name: Build specialized Docker images
        run: |
          docker build -t consortium-ssh-node -f tests/docker/Dockerfile.ssh-node tests/docker/
          docker build -t consortium-nix-node -f tests/docker/Dockerfile.nix-node tests/docker/
          docker build -t consortium-ansible-node -f tests/docker/Dockerfile.ansible-node tests/docker/

      - name: Run tool integration tests
        run: |
          cargo nextest run -p consortium \
            --features docker-tests \
            --test tool_integration \
            --profile ci \
            --test-threads=1 \
            --no-fail-fast \
            2>&1 || true

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Tool Integration Results
          include_passed: true

      - name: Generate summary
        if: always()
        run: |
          echo "## Tool Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`$(hostname)\` (self-hosted NixOS)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup containers
        if: always()
        run: |
          docker ps -a --filter "name=nix-int\|ansible-int" -q | xargs -r docker rm -f

  # ── Layer 3: Nix Integration (self-hosted NixOS Mac Minis) ────────
  nix-integration:
    name: Nix Integration (self-hosted)
    needs: [docker-integration]
    runs-on: nix-builder
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Build consortium-cli
        run: nix build .#consortium-cli

      - name: Verify cast binary works
        run: |
          ./result/bin/cast --help
          ./result/bin/claw --help

      - name: Test distributed builds (if builders reachable)
        continue-on-error: true
        run: |
          if [ -f /etc/nix/machines ]; then
            nix build .#consortium-cli --builders @/etc/nix/machines --max-jobs 0
          else
            echo "No machines file, skipping distributed build test"
          fi

      - name: Generate summary
        if: always()
        run: |
          echo "## Nix Integration (self-hosted)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -L result ]; then
            echo "| \`nix build .#consortium-cli\` | ✅ \`$(readlink result)\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| \`nix build .#consortium-cli\` | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f /etc/nix/machines ]; then
            echo "| Distributed builders | ✅ $(wc -l < /etc/nix/machines) builders |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Distributed builders | ⚠️ not configured |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Runner | \`$(hostname)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nix | \`$(nix --version)\` |" >> $GITHUB_STEP_SUMMARY
