name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'doc/**'
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Layer 1: Unit Tests (fast, GitHub-hosted) ─────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: |
          cargo test --workspace -- -Z unstable-options --format json --report-time 2>&1 | tee test-results.json
          # Also run normally to get exit code
          cargo test --workspace

      - name: Generate test summary
        if: always()
        run: |
          echo "## Layer 1: Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse JSON test results
          if [ -f test-results.json ]; then
            PASSED=$(grep -c '"ok"' test-results.json 2>/dev/null || echo "0")
            FAILED=$(grep '"event":"failed"' test-results.json | grep -c '"type":"test"' 2>/dev/null || echo "0")
            TOTAL=$((PASSED + FAILED))

            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **All $TOTAL tests passed**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$FAILED/$TOTAL tests failed**" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Test breakdown by crate</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Crate | Tests | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY

            for crate in consortium consortium-nix consortium-ansible consortium-slurm consortium-ray consortium-skypilot consortium-cli; do
              count=$(grep "\"name\":\"$crate" test-results.json 2>/dev/null | grep -c '"event":"ok"' || echo "0")
              if [ "$count" -gt 0 ]; then
                echo "| $crate | $count | ✅ |" >> $GITHUB_STEP_SUMMARY
              fi
            done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Layer 2: Docker Integration Tests (GitHub-hosted) ─────────────
  docker-integration:
    name: Docker Integration Tests
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docker-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate SSH keys for test containers
        run: |
          mkdir -p tests/docker/ssh
          ssh-keygen -t ed25519 -f tests/docker/ssh/id_ed25519 -N "" -q
          cp tests/docker/ssh/id_ed25519.pub tests/docker/ssh/authorized_keys

      - name: Build SSH node image
        run: docker build -t consortium-ssh-node -f tests/docker/Dockerfile.ssh-node tests/docker/

      - name: Run Docker integration tests
        id: docker_tests
        run: |
          cargo test -p consortium \
            --features docker-tests \
            --test docker_integration \
            -- --test-threads=1 2>&1 | tee docker-results.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## Layer 2: Docker Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f docker-results.txt ]; then
            PASSED=$(grep -c "... ok$" docker-results.txt || echo "0")
            FAILED=$(grep -c "... FAILED$" docker-results.txt || echo "0")
            TOTAL=$((PASSED + FAILED))

            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **All $PASSED tests passed** against Docker SSH cluster" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$FAILED/$TOTAL tests failed**" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Test results</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            grep "^test " docker-results.txt | while read line; do
              name=$(echo "$line" | sed 's/^test //' | sed 's/ \.\.\. .*//')
              status=$(echo "$line" | grep -o 'ok\|FAILED')
              icon=$([ "$status" = "ok" ] && echo "✅" || echo "❌")
              echo "| \`$name\` | $icon |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup containers
        if: always()
        run: |
          docker ps -a --filter "name=consortium-test" -q | xargs -r docker rm -f
          docker network ls --filter "name=consortium-test" -q | xargs -r docker network rm

  # ── Layer 2b: Tool Integration Tests (self-hosted, needs Docker + nix images) ─
  tool-integration:
    name: Tool Integration Tests
    needs: unit
    runs-on: nix-builder
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tool-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate SSH keys for test containers
        run: |
          mkdir -p tests/docker/ssh
          if [ ! -f tests/docker/ssh/id_ed25519 ]; then
            ssh-keygen -t ed25519 -f tests/docker/ssh/id_ed25519 -N "" -q
            cp tests/docker/ssh/id_ed25519.pub tests/docker/ssh/authorized_keys
          fi

      - name: Build specialized Docker images
        run: |
          docker build -t consortium-ssh-node -f tests/docker/Dockerfile.ssh-node tests/docker/
          docker build -t consortium-nix-node -f tests/docker/Dockerfile.nix-node tests/docker/
          docker build -t consortium-ansible-node -f tests/docker/Dockerfile.ansible-node tests/docker/

      - name: Run tool integration tests
        run: |
          cargo test -p consortium \
            --features docker-tests \
            --test tool_integration \
            -- --test-threads=1 2>&1 | tee tool-results.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## Layer 2b: Tool Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`$(hostname)\` (self-hosted NixOS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f tool-results.txt ]; then
            PASSED=$(grep -c "... ok$" tool-results.txt || echo "0")
            FAILED=$(grep -c "... FAILED$" tool-results.txt || echo "0")
            TOTAL=$((PASSED + FAILED))

            if [ "$FAILED" -eq 0 ] && [ "$PASSED" -gt 0 ]; then
              echo "✅ **All $PASSED tests passed** (real nix build, real ansible)" >> $GITHUB_STEP_SUMMARY
            elif [ "$TOTAL" -eq 0 ]; then
              echo "⚠️ **No tests ran**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$FAILED/$TOTAL tests failed**" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Test results</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            grep "^test " tool-results.txt | while read line; do
              name=$(echo "$line" | sed 's/^test //' | sed 's/ \.\.\. .*//')
              status=$(echo "$line" | grep -o 'ok\|FAILED')
              icon=$([ "$status" = "ok" ] && echo "✅" || echo "❌")
              echo "| \`$name\` | $icon |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup containers
        if: always()
        run: |
          docker ps -a --filter "name=nix-int\|ansible-int" -q | xargs -r docker rm -f

  # ── Layer 3: Nix Integration Tests (self-hosted on nixlab K8s) ────
  nix-integration:
    name: Nix Integration (self-hosted)
    needs: [docker-integration]
    runs-on: nix-builder
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Nix is pre-installed on NixOS runners (Mac Minis).
      - uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Build consortium-cli
        run: nix build .#consortium-cli

      - name: Verify cast binary works
        run: |
          ./result/bin/cast --help
          ./result/bin/claw --help

      - name: Test distributed builds (if builders reachable)
        continue-on-error: true
        run: |
          if [ -f /etc/nix/machines ]; then
            nix build .#consortium-cli --builders @/etc/nix/machines --max-jobs 0
          else
            echo "No machines file, skipping distributed build test"
          fi

      - name: Generate test summary
        if: always()
        run: |
          echo "## Layer 3: Nix Integration (self-hosted)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`$(hostname)\` (NixOS Mac Mini)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ -L result ]; then
            echo "| \`nix build .#consortium-cli\` | ✅ Built: \`$(readlink result)\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| \`nix build .#consortium-cli\` | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f /etc/nix/machines ]; then
            BUILDERS=$(wc -l < /etc/nix/machines)
            echo "| Distributed builders | ✅ $BUILDERS builders configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Distributed builders | ⚠️ No machines file |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Runner host | \`$(hostname)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nix version | \`$(nix --version)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| System | \`$(uname -m)\` |" >> $GITHUB_STEP_SUMMARY

  # ── Summary ──────────────────────────────────────────────────────
  summary:
    name: Test Summary
    needs: [unit, docker-integration, tool-integration, nix-integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate overall summary
        run: |
          echo "# Consortium CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Unit Tests | ${{ needs.unit.result == 'success' && '✅' || '❌' }} ${{ needs.unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Docker Integration | ${{ needs.docker-integration.result == 'success' && '✅' || '❌' }} ${{ needs.docker-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2b | Tool Integration | ${{ needs.tool-integration.result == 'success' && '✅' || '❌' }} ${{ needs.tool-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Nix Integration | ${{ needs.nix-integration.result == 'success' && '✅' || '❌' }} ${{ needs.nix-integration.result }} |" >> $GITHUB_STEP_SUMMARY
