name: Migration Scorecard

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '.gitignore'
      - '.gitattributes'
      - 'doc/**'
      - 'README.md'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - '.gitignore'
      - '.gitattributes'
      - 'doc/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ClusterShell ref to test against (default: pinned in UPSTREAM_REF)"
        required: false
        default: ""

jobs:
  # ── Layer 1: Unit Tests (fast, no external deps) ──────────────────
  scorecard:
    name: Unit Tests & Migration Scorecard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ─────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install virtualenv
          python -m virtualenv .venv
          source .venv/bin/activate
          pip install pytest pytest-timeout pytest-xdist maturin pyyaml

      # ── Upstream sync ──────────────────────────────────────────
      - name: Sync upstream tests
        run: |
          REF="${{ github.event.inputs.upstream_ref }}"
          if [ -z "$REF" ]; then
            bash harness/sync_upstream_tests.sh
          else
            bash harness/sync_upstream_tests.sh "$REF"
          fi

      # ── Build ──────────────────────────────────────────────────
      - name: Build PyO3 bindings
        run: |
          cd crates/consortium-py
          source ../../.venv/bin/activate
          maturin develop --release

      # ── Rust unit tests ────────────────────────────────────────
      - name: Run Rust unit tests
        continue-on-error: true
        run: |
          mkdir -p results
          source .venv/bin/activate
          cargo nextest run \
            -p consortium \
            --profile ci \
            --no-fail-fast \
            2>&1 | tee results/rust-raw.txt

          # Generate JUnit XML from cargo test output
          cargo test -p consortium 2>&1 | \
            python harness/cargo_to_junit.py > results/rust-unit.xml

      # ── Python tests: original backend ─────────────────────────
      - name: Run Python tests (original backend)
        continue-on-error: true
        env:
          CONSORTIUM_BACKEND: python
          PYTHONPATH: ${{ github.workspace }}/lib
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v \
            --timeout=30 \
            --tb=short \
            --junit-xml=results/python-original.xml \
            || true

      # ── Python tests: Rust backend ─────────────────────────────
      - name: Run Python tests (Rust backend)
        continue-on-error: true
        env:
          CONSORTIUM_BACKEND: rust
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v \
            --timeout=30 \
            --tb=short \
            --junit-xml=results/python-rust.xml \
            || true

      # ── Generate scorecard ─────────────────────────────────────
      - name: Generate test mapping
        run: python harness/generate_test_mapping.py --update

      - name: Render scorecard
        run: python harness/render_summary.py --results-dir=results >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-results
          path: |
            results/
            TEST_MAPPING.toml
          retention-days: 30

  # ── Layer 2: Integration Tests (Docker, runs after unit tests) ────
  integration:
    name: Docker Integration Tests
    needs: scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Docker SSH node image
        run: |
          cd tests/docker
          docker build -t consortium-ssh-node -f Dockerfile.ssh-node .

      - name: Run integration tests (small cluster — 6 nodes)
        run: |
          cargo test -p consortium \
            --features docker-tests \
            --test docker_integration \
            -- --test-threads=1 \
            -Z unstable-options --format json 2>&1 | tee results-integration.json || true

      - name: Run integration tests (large cluster — 33 nodes)
        run: |
          cargo test -p consortium \
            --features docker-tests \
            --test docker_integration \
            "test_scale" \
            -- --test-threads=1 || true

      - name: Cleanup Docker containers
        if: always()
        run: |
          docker ps -a --filter "name=consortium-test" -q | xargs -r docker rm -f
          docker network ls --filter "name=consortium-test" -q | xargs -r docker network rm
