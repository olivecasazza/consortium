name: Migration Scorecard

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ClusterShell ref to test against (default: pinned in UPSTREAM_REF)"
        required: false
        default: ""

jobs:
  scorecard:
    name: Migration Scorecard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ─────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout pytest-xdist maturin pyyaml

      # ── Upstream sync ──────────────────────────────────────────
      - name: Sync upstream tests
        run: |
          REF="${{ github.event.inputs.upstream_ref }}"
          if [ -z "$REF" ]; then
            bash harness/sync_upstream_tests.sh
          else
            bash harness/sync_upstream_tests.sh "$REF"
          fi

      # ── Build ──────────────────────────────────────────────────
      - name: Build PyO3 bindings
        run: |
          cd crates/consortium-py
          maturin develop --release

      # ── Rust unit tests ────────────────────────────────────────
      - name: Run Rust unit tests
        continue-on-error: true
        run: |
          mkdir -p results
          cargo nextest run \
            -p consortium \
            --profile ci \
            --no-fail-fast \
            2>&1 | tee results/rust-raw.txt

          # Generate JUnit XML from cargo test output
          cargo test -p consortium 2>&1 | \
            python harness/cargo_to_junit.py > results/rust-unit.xml

      # ── Python tests: original backend ─────────────────────────
      - name: Run Python tests (original backend)
        continue-on-error: true
        env:
          CONSORTIUM_BACKEND: python
          PYTHONPATH: ${{ github.workspace }}/lib
        run: |
          python -m pytest tests/ -v \
            --timeout=30 \
            --tb=short \
            --junit-xml=results/python-original.xml \
            || true

      # ── Python tests: Rust backend ─────────────────────────────
      - name: Run Python tests (Rust backend)
        continue-on-error: true
        env:
          CONSORTIUM_BACKEND: rust
        run: |
          python -m pytest tests/ -v \
            --timeout=30 \
            --tb=short \
            --junit-xml=results/python-rust.xml \
            || true

      # ── Generate scorecard ─────────────────────────────────────
      - name: Generate test mapping
        run: python harness/generate_test_mapping.py --update

      - name: Render scorecard
        run: python harness/render_summary.py --results-dir=results >> $GITHUB_STEP_SUMMARY

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-results
          path: |
            results/
            TEST_MAPPING.toml
          retention-days: 30
