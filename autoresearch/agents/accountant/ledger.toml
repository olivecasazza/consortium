id = "minimax-m2.5-free"
openrouter_id = "minimax/minimax-m2.5:free"
litellm_registered = false
tier = "free"
context = 196608
params = "~230B MoE"
input_per_mtok = 0.0
output_per_mtok = 0.0
day_cap_req = 50
good_for = ["tool-use", "code-edit", "planning", "reasoning", "long-context"]
notes = "TOP PICK 2026-04-25: SWE-Bench Verified 80.2%, BFCL multi-turn 76.8 (beats Claude 4.5's 68.0 and Gemini 3 Pro's 61.0). New on free tier; assume aggressive throttling. NOT IN LITELLM YET — needs nixlab PR to register."
