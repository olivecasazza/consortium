# Model ledger — accountant's source of truth.
#
# Read by drain-queue and the accountant agent to allocate models.
# Refreshed on a 6h cadence by `mol-accountant-patrol` (scripts/patrol.sh)
# pulling from OpenRouter /api/v1/models + /api/v1/auth/key and LiteLLM
# /spend/users + /global/spend.
#
# Live snapshot: agents/accountant/usage-snapshot.toml
# Original research: agents/accountant/research-2026-04-25.md
#
# OpenRouter free-tier rate limits apply to every `tier = "free"` row:
#   20 req/min; 50 req/day anonymous; 1000 req/day with $10 lifetime credit.
#   Failed requests count. 429s under load are common on popular `:free`
#   slugs — always wire a fallback.
#
# Tier:
#   on-prem      runs on nixlab GPUs via LiteLLM (no marginal cost)
#   free         OpenRouter free-tier (rate-capped, no $)
#   paid-cheap   < $1/Mtok input
#   paid         > $1/Mtok input
#
# Tags vocabulary:
#   tool-use       reliably emits OpenAI-format tool calls
#   code-edit      comfortable making structural Rust/Python edits
#   reasoning      strong on planning / root-cause / multi-step
#   long-context   ≥128k context, fits whole crates
#   planning       multi-step decomposition / DAG-style work
#   multilingual   non-English coverage (rare-need for autoresearch)
#   bootstrap      stable + cheap enough to host an LLM agent itself
#
# `litellm_registered`: true if this row has a model_name in nixlab's
#   modules/k8s/apps/litellm/litellm-config.yaml. If false, requires a
#   nixlab PR before drain-queue can route to it (or call OpenRouter
#   directly, bypassing LiteLLM tracking).

# ────────────────────────────────────────────────────────────────────────
# free — sorted best-fit-first for code-edit + tool-use
# ────────────────────────────────────────────────────────────────────────

